services:
  postgres:
    image: postgres:16-alpine
    container_name: bereza-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bereza}
      POSTGRES_USER: ${POSTGRES_USER:-bereza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bereza}
    volumes:
      - bereza-pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bereza} -d ${POSTGRES_DB:-bereza}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [bereza-net]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bereza-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bereza}
      DB_USER: ${POSTGRES_USER:-bereza}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bereza}
      SERVER_PORT: 8080
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      REMEMBER_ME_KEY: ${REMEMBER_ME_KEY:-please-change-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      STORAGE_ROOT: /app/var/storage
    volumes:
      - bereza-storage:/app/var/storage
    expose: ["8080"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/actuator/health/liveness"]
      interval: 15s
      timeout: 3s
      start_period: 40s
      retries: 6
    restart: unless-stopped
    networks: [bereza-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bereza-frontend
    depends_on: [backend]
    expose: ["80"]
    restart: unless-stopped
    networks: [bereza-net]

  nginx:
    image: nginx:1.27-alpine
    container_name: bereza-nginx
    depends_on: [backend, frontend]
    ports:
      - "80:80"
      # - "443:443"   # включить для HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks: [bereza-net]

volumes:
  bereza-pg:
  bereza-storage:

networks:
  bereza-net:
    driver: bridge
